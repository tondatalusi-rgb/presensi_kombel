<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PRESENSI - DISDIKPORA KAB.DONGGALA</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .gradient-custom { background: linear-gradient(135deg, #4338ca 0%, #1e1b4b 100%); }
        .camera-container { position: relative; width: 100%; aspect-ratio: 3/4; overflow: hidden; border-radius: 2rem; background: black; }
        #video, #photoPreview { width: 100%; height: 100%; object-fit: cover; border-radius: 2rem; }
        .mirror { transform: scaleX(-1); }
        .hidden { display: none; }
    </style>
</head>
<body class="bg-indigo-50 min-h-screen font-sans">

    <div id="loginSection" class="flex items-center justify-center min-h-screen p-4">
        <div class="max-w-md w-full bg-white p-8 rounded-[2.5rem] shadow-2xl border text-center">
            <h1 class="text-2xl font-black text-indigo-900 uppercase">PRESENSI KOMBEL</h1>
            <form id="loginForm" class="space-y-4 mt-6">
                <input type="number" id="nip" placeholder="Masukkan NIP" required class="w-full p-4 bg-gray-50 border rounded-2xl text-center">
                <button type="submit" class="w-full bg-indigo-600 text-white py-4 rounded-2xl font-bold uppercase">Masuk</button>
            </form>
        </div>
    </div>

    <div id="mainSection" class="hidden pb-10">
        <div class="gradient-custom text-white p-8 rounded-b-[3rem] shadow-xl">
            <h2 id="userNameDisp" class="text-xl font-bold italic">-</h2>
            <span id="detailAlamat" class="text-[10px] opacity-80 uppercase">Mendeteksi lokasi...</span>
            <div id="locText" class="text-[10px] bg-white/10 p-2 mt-2 rounded-lg">📍 Mencari koordinat...</div>
        </div>

        <div class="max-w-md mx-auto p-5 space-y-6">
            <div class="bg-white p-6 rounded-[2.5rem] shadow-sm border space-y-4">
                <select id="statusAbsen" onchange="toggleStatusUI()" class="w-full p-3 bg-indigo-600 text-white rounded-xl font-bold outline-none">
                    <option value="Hadir">HADIR</option>
                    <option value="Izin">IZIN</option>
                    <option value="Sakit">SAKIT</option>
                </select>
                <input type="text" id="peran" readonly class="w-full p-3 bg-gray-100 border rounded-xl font-bold text-gray-500">
                <input type="text" id="namaSekolah" readonly class="w-full p-3 bg-gray-100 border rounded-xl font-bold text-gray-500">
            </div>

            <div class="bg-white p-6 rounded-[2.5rem] shadow-sm border text-center">
                <div class="camera-container mb-4">
                    <video id="video" autoplay playsinline class="mirror"></video>
                    <img id="photoPreview" class="hidden absolute inset-0 mirror">
                </div>
                <div class="grid grid-cols-2 gap-2">
                    <button onclick="takePicture()" class="py-3 bg-indigo-600 text-white rounded-xl font-bold uppercase text-xs">Ambil Foto</button>
                    <button onclick="resetCamera()" class="py-3 bg-gray-200 text-gray-700 rounded-xl font-bold uppercase text-xs">Ulang</button>
                </div>
            </div>
            <button id="btnSubmit" onclick="submitAbsensi()" class="w-full bg-indigo-900 text-white py-5 rounded-[2.5rem] font-black uppercase">Kirim Absensi</button>
        </div>
    </div>

<script>
    const API = 'https://script.google.com/macros/s/AKfycbygcO6AaLNmQNML9SmvpdBJIrgYn5GZqeEvCQ_do0WOpg_F7tC-48YKN2uQDAR4cX4/exec';
    let userCoords = { lat: 0, lon: 0 }, imgData = null;
    let wilayah = { desa: "TOWALE", kecamatan: "-", kabupaten: "DONGGALA" };

    // Initialize Login
    document.getElementById('loginForm').onsubmit = async (e) => {
        e.preventDefault();
        const nip = document.getElementById('nip').value;
        const res = await fetch(`${API}?action=checkNIP&nip=${nip}`);
        const data = await res.json();
        if(data.success) {
            localStorage.setItem('userNIP', nip);
            localStorage.setItem('userName', data.nama);
            localStorage.setItem('userPeran', data.peran);
            localStorage.setItem('userSekolah', data.sekolah);
            location.reload();
        } else alert("NIP Tidak Terdaftar!");
    };

    if(localStorage.getItem('userNIP')) {
        document.getElementById('loginSection').classList.add('hidden');
        document.getElementById('mainSection').classList.remove('hidden');
        document.getElementById('userNameDisp').innerText = localStorage.getItem('userName');
        document.getElementById('peran').value = localStorage.getItem('userPeran');
        document.getElementById('namaSekolah').value = localStorage.getItem('userSekolah');
        
        initCamera('user');
        initLocation();
    }

    async function initCamera(mode) {
        try {
            const videoEl = document.getElementById('video');
            if (videoEl.srcObject) videoEl.srcObject.getTracks().forEach(t => t.stop());
            const stream = await navigator.mediaDevices.getUserMedia({ video: { facingMode: mode } });
            videoEl.srcObject = stream;
        } catch(e) { alert("Izinkan akses kamera di pengaturan browser!"); }
    }

    async function initLocation() {
        navigator.geolocation.getCurrentPosition(async (pos) => {
            userCoords = { lat: pos.coords.latitude, lon: pos.coords.longitude };
            document.getElementById('locText').innerText = `📍 ${userCoords.lat.toFixed(5)}, ${userCoords.lon.toFixed(5)}`;
            
            const res = await fetch(`https://nominatim.openstreetmap.org/reverse?format=json&lat=${userCoords.lat}&lon=${userCoords.lon}`);
            const data = await res.json();
            const addr = data.address;
            
            wilayah.desa = (addr.village || addr.suburb || "TOWALE").toUpperCase();
            wilayah.kecamatan = (addr.county || "-").toUpperCase().replace("KECAMATAN ", "");
            
            document.getElementById('detailAlamat').innerText = `${wilayah.desa}, KEC. ${wilayah.kecamatan}, KAB. DONGGALA`;
        }, () => {
            document.getElementById('detailAlamat').innerText = "TOWALE, KEC. -, KAB. DONGGALA";
        }, { enableHighAccuracy: true, timeout: 10000 });
    }

    function takePicture() {
        const v = document.getElementById('video'), c = document.createElement('canvas');
        c.width = v.videoWidth; c.height = v.videoHeight;
        c.getContext('2d').drawImage(v, 0, 0);
        imgData = c.toDataURL('image/jpeg', 0.6);
        document.getElementById('photoPreview').src = imgData;
        document.getElementById('photoPreview').classList.remove('hidden');
        v.classList.add('hidden');
    }

    function resetCamera() { 
        imgData = null; document.getElementById('photoPreview').classList.add('hidden'); 
        document.getElementById('video').classList.remove('hidden'); 
    }

    async function submitAbsensi() {
        if(userCoords.lat === 0) return alert("Menunggu GPS...!");
        const btn = document.getElementById('btnSubmit');
        btn.disabled = true; btn.innerText = "MENGIRIM...";
        const payload = { 
            action: 'submitAbsen', 
            nip: localStorage.getItem('userNIP'), 
            desa: wilayah.desa, 
            kecamatan: wilayah.kecamatan, 
            image: imgData, 
            lat: userCoords.lat, 
            lon: userCoords.lon 
        };
        await fetch(API, { method: 'POST', mode: 'no-cors', body: JSON.stringify(payload) });
        alert("✅ LAPORAN TERKIRIM!"); location.reload();
    }
</script>
</body>
</html>
