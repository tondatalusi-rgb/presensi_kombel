<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PRESENSI - DISDIKPORA KAB.DONGGALA</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .gradient-custom { background: linear-gradient(135deg, #4338ca 0%, #1e1b4b 100%); }
        
        /* Tampilan Kamera Full Ruangan */
        .camera-container {
            position: relative;
            width: 100%;
            aspect-ratio: 3 / 4; /* Rasio lebih tinggi untuk cakupan ruangan */
            overflow: hidden;
            border-radius: 2rem;
            background: black;
        }

        #video, #photoPreview { 
            width: 100%; 
            height: 100%; 
            object-fit: cover; /* Mengisi seluruh layar kontainer */
            border-radius: 2rem;
        }

        /* Efek Mirror untuk Kamera Depan */
        .mirror { transform: scaleX(-1); }
        .hidden { display: none; }
    </style>
</head>
<body class="bg-indigo-50 min-h-screen font-sans">

    <div id="loginSection" class="flex items-center justify-center min-h-screen p-4">
        <div class="max-w-md w-full bg-white p-8 rounded-[2.5rem] shadow-2xl border border-indigo-100 text-center">
            <img src="https://upload.wikimedia.org/wikipedia/commons/e/e5/Lambang_Kabupaten_Donggala_%282015-sekarang%29.png" class="h-16 mx-auto mb-6">
            <h1 class="text-2xl font-black text-indigo-900 uppercase">PRESENSI KEGIATAN KOMBEL</h1>
            <form id="loginForm" class="space-y-4 mt-6">
                <input type="number" id="nip" placeholder="Masukkan NIP" required class="w-full p-4 bg-gray-50 border rounded-2xl text-center font-mono text-lg outline-none focus:ring-2 focus:ring-indigo-500">
                <button type="submit" id="btnLog" class="w-full bg-indigo-600 text-white py-4 rounded-2xl font-bold shadow-lg uppercase">Masuk Dashboard</button>
            </form>
        </div>
    </div>

    <div id="mainSection" class="hidden pb-10">
        <div class="gradient-custom text-white p-8 rounded-b-[3rem] shadow-xl">
            <div class="flex justify-between items-center mb-6">
                <div class="flex flex-col">
                    <h2 id="userNameDisp" class="text-xl font-bold italic">-</h2>
                    <span id="detailAlamat" class="text-[10px] opacity-80 uppercase tracking-wider font-semibold">Mencari detail wilayah...</span>
                </div>
                <button onclick="logout()" class="text-xs bg-red-500/30 px-3 py-1 rounded-lg">Keluar</button>
            </div>
            <div id="locText" class="text-xs bg-white/10 p-3 rounded-xl backdrop-blur-md">📍 Mendeteksi koordinat...</div>
        </div>

        <div class="max-w-md mx-auto p-5 space-y-6 -mt-4">
            <div class="bg-white p-6 rounded-[2.5rem] shadow-sm border space-y-4">
                <div class="grid grid-cols-2 gap-2">
                    <input type="text" id="peran" readonly class="p-3 bg-indigo-50 border rounded-xl font-bold text-indigo-700">
                    <select id="jenjang" class="p-3 bg-gray-50 border rounded-xl font-semibold outline-none">
                        <option value="SD">SD</option><option value="SMP">SMP</option><option value="TK">TK/PAUD</option>
                    </select>
                </div>
                <input type="text" id="namaSekolah" readonly class="w-full p-3 bg-gray-100 border rounded-xl font-bold text-gray-500">

                <div class="space-y-1">
                    <label class="text-[10px] font-bold text-gray-400 ml-2 uppercase">Status Kehadiran</label>
                    <select id="statusAbsen" onchange="toggleStatusUI()" class="w-full p-3 bg-indigo-600 text-white rounded-xl font-bold outline-none">
                        <option value="Hadir">HADIR (SHIFT)</option>
                        <option value="Izin">IZIN</option>
                        <option value="Sakit">SAKIT</option>
                        <option value="Alpa">ALPA</option>
                    </select>
                </div>

                <div id="shiftBox" class="grid grid-cols-2 gap-2">
                    <div class="space-y-1">
                        <label class="text-[10px] font-bold text-gray-400 ml-1 uppercase">Jam Mulai</label>
                        <input type="time" id="shiftMulai" class="w-full p-2 bg-gray-50 border rounded-xl text-center font-bold">
                    </div>
                    <div class="space-y-1">
                        <label class="text-[10px] font-bold text-gray-400 ml-1 uppercase">Jam Selesai</label>
                        <input type="time" id="shiftSelesai" class="w-full p-2 bg-gray-50 border rounded-xl text-center font-bold">
                    </div>
                </div>

                <div id="formGuru" class="space-y-4">
                    <div class="grid grid-cols-2 gap-2">
                        <input type="text" id="kelas" placeholder="Kelas" class="p-3 bg-gray-50 border rounded-xl outline-none">
                        <input type="text" id="mapel" placeholder="Mapel" class="p-3 bg-gray-50 border rounded-xl outline-none">
                    </div>
                    <input type="text" id="bab" placeholder="Bab Tema" class="w-full p-3 bg-gray-50 border rounded-xl outline-none">
                    <input type="text" id="materi" placeholder="Materi / Sub Tema" class="w-full p-3 bg-gray-50 border rounded-xl outline-none">
                    
                    <div class="space-y-1">
                        <label class="text-[10px] font-bold text-gray-400 ml-2 uppercase">Jumlah Kehadiran Siswa</label>
                        <input type="number" id="jmlSiswa" placeholder="0" class="w-full p-3 bg-indigo-50 border border-indigo-100 rounded-xl font-bold text-indigo-800 outline-none focus:ring-2 focus:ring-indigo-500">
                    </div>
                </div>

                <div id="formKepsek" class="hidden">
                    <textarea id="catatanKegiatan" placeholder="Catatan kegiatan manajerial..." class="w-full p-4 bg-gray-50 border rounded-2xl h-24 outline-none"></textarea>
                </div>

                <div id="keteranganBox" class="hidden">
                    <textarea id="keterangan" placeholder="Berikan alasan ketidakhadiran..." class="w-full p-4 bg-gray-50 border border-red-200 rounded-2xl h-24 outline-none"></textarea>
                </div>
            </div>

            <div class="bg-white p-6 rounded-[2.5rem] shadow-sm border text-center">
                <div class="camera-container mb-4 shadow-xl">
                    <video id="video" autoplay playsinline class="mirror"></video>
                    <img id="photoPreview" class="hidden absolute inset-0 mirror">
                </div>
                <div class="grid grid-cols-2 gap-2">
                    <button onclick="takePicture()" class="py-3 bg-indigo-600 text-white rounded-xl font-bold uppercase text-xs">Ambil Foto</button>
                    <label class="py-3 bg-emerald-600 text-white rounded-xl font-bold cursor-pointer uppercase text-xs">Upload
                        <input type="file" accept="image/*" class="hidden" onchange="handleFileUpload(this)">
                    </label>
                </div>
                <button onclick="switchCamera()" class="w-full mt-2 py-2 bg-gray-200 text-gray-700 rounded-xl font-bold text-[10px] uppercase tracking-widest">🔄 Ganti Kamera (Depan/Belakang)</button>
                <button onclick="resetCamera()" class="mt-2 text-[10px] text-gray-400 uppercase font-bold">Ulang Foto</button>
            </div>

            <button id="btnSubmit" onclick="submitAbsensi()" class="w-full bg-indigo-900 text-white py-5 rounded-[2.5rem] font-black text-lg shadow-2xl uppercase tracking-widest transition-all">Kirim Absensi</button>
        </div>
    </div>

<script>
    const API = 'https://script.google.com/macros/s/AKfycbygcO6AaLNmQNML9SmvpdBJIrgYn5GZqeEvCQ_do0WOpg_F7tC-48YKN2uQDAR4cX4/exec'; 
    let userCoords = { lat: 0, lon: 0 }, imgData = null;
    let wilayah = { desa: "TOWALE", kecamatan: "-" }; // Default nilai
    let currentFacingMode = "user";

    // --- Inisialisasi Saat Login Berhasil ---
    if(localStorage.getItem('userNIP')) {
        document.getElementById('loginSection').classList.add('hidden');
        document.getElementById('mainSection').classList.remove('hidden');
        document.getElementById('userNameDisp').innerText = localStorage.getItem('userName');
        document.getElementById('peran').value = localStorage.getItem('userPeran');
        document.getElementById('namaSekolah').value = localStorage.getItem('userSekolah');
        
        // Panggil fungsi utama segera setelah login
        toggleStatusUI(); 
        initCamera(currentFacingMode); 
        initLocation();
    }

    // --- Perbaikan Kamera (Lebih Stabil) ---
    async function initCamera(facingMode) {
        try {
            const videoEl = document.getElementById('video');
            if (videoEl.srcObject) {
                videoEl.srcObject.getTracks().forEach(track => track.stop());
            }

            const stream = await navigator.mediaDevices.getUserMedia({ 
                video: { facingMode: { ideal: facingMode }, width: { ideal: 1280 }, height: { ideal: 720 } } 
            });
            
            videoEl.srcObject = stream;
            currentFacingMode = facingMode;
        } catch (err) {
            console.error("Kamera error:", err);
            alert("Gagal akses kamera. Pastikan Anda memberi izin akses kamera pada browser.");
        }
    }

    // --- Perbaikan Lokasi (Otomatis & Cepat) ---
    async function initLocation() {
    // Tambahkan timeout agar tidak menunggu terlalu lama
    navigator.geolocation.getCurrentPosition(async (pos) => {
        userCoords = { lat: pos.coords.latitude, lon: pos.coords.longitude };
        document.getElementById('locText').innerText = `📍 Koord: ${userCoords.lat.toFixed(6)}, ${userCoords.lon.toFixed(6)}`;
        
        try {
            const response = await fetch(`https://nominatim.openstreetmap.org/reverse?format=json&lat=${userCoords.lat}&lon=${userCoords.lon}&zoom=14`, {
                headers: { 'User-Agent': 'E-Absensi-Donggala' }
            });
            const data = await response.json();
            const addr = data.address;
            
            // 1. Ambil Desa
            const desa = addr.village || addr.suburb || addr.hamlet || addr.town || "-";
            
            // 2. Ambil Kecamatan (Bersihkan prefix)
            let rawKec = addr.county || addr.city_district || "";
            rawKec = rawKec.replace(/^(Kecamatan|Kabupaten)\s+/i, "");
            const kecamatan = rawKec ? rawKec.toUpperCase() : "-";

            // 3. Ambil Kabupaten (Pastikan ini terdefinisi)
            let rawKab = addr.county || addr.city || "DONGGALA";
            rawKab = rawKab.replace(/^(Kabupaten|Regency|City)\s+/i, "");
            const kabupaten = rawKab.toUpperCase();

            // Simpan ke variabel global
            wilayah.desa = desa;
            wilayah.kecamatan = kecamatan;
            wilayah.kabupaten = kabupaten; // Tambahkan ini agar tidak undefined

            // Tampilkan ke UI
            document.getElementById('detailAlamat').innerText = 
                `${desa.toUpperCase()}, KEC. ${kecamatan}, KAB. ${kabupaten}`;
                
        } catch (e) { 
            console.error(e);
            document.getElementById('detailAlamat').innerText = "LOKASI TERDETEKSI"; 
        }
    }, (err) => { 
        document.getElementById('locText').innerText = "❌ GPS Tidak Aktif";
        document.getElementById('detailAlamat').innerText = "TOWALE, KEC. -, KAB. DONGGALA";
    }, { enableHighAccuracy: true, timeout: 10000 });
}
    // --- Fungsi Pendukung Lainnya ---
    function switchCamera() {
        currentFacingMode = (currentFacingMode === "user") ? "environment" : "user";
        initCamera(currentFacingMode);
    }

    async function submitAbsensi() {
        const status = document.getElementById('statusAbsen').value;
        if(!imgData && status !== "Alpa") return alert("Ambil foto bukti!");
        
        const btn = document.getElementById('btnSubmit');
        btn.disabled = true; btn.innerText = "MENGIRIM...";

        const payload = {
            action: 'submitAbsen',
            nip: localStorage.getItem('userNIP'),
            nama: localStorage.getItem('userName'),
            peran: localStorage.getItem('userPeran'),
            jenjang: document.getElementById('jenjang').value,
            namaSekolah: document.getElementById('namaSekolah').value,
            status: status,
            shiftMulai: document.getElementById('shiftMulai').value,
            shiftSelesai: document.getElementById('shiftSelesai').value,
            kelas: document.getElementById('kelas').value,
            mapel: document.getElementById('mapel').value,
            bab: document.getElementById('bab').value,
            materi: document.getElementById('materi').value,
            jmlSiswa: document.getElementById('jmlSiswa').value,
            desa: wilayah.desa,
            kecamatan: wilayah.kecamatan,
            catatan: document.getElementById('catatanKegiatan').value,
            keterangan: document.getElementById('keterangan').value,
            image: imgData,
            lat: userCoords.lat,
            lon: userCoords.lon
        };

        await fetch(API, { method: 'POST', mode: 'no-cors', body: JSON.stringify(payload) });
        alert("✅ LAPORAN TERKIRIM!"); 
        location.reload();
    }
</script>
</body>
</html>
